<text x="40" y="52" class="mono" font-size="13" fill="#2dd4bf" letter-spacing="2">/// VERITY // v2 — HARNESS SOVEREIGNTY · SAME MODEL ± THE HARNESS · REPRODUCIBLE</text>
<text x="44" y="104" class="hv" font-size="40" fill="#eafffb">THE HARNESS DOES THE WORK.</text>
