<text x="56" y="506" class="nar" font-size="13" fill="#586872" font-style="italic">Honest control: gates as a bare PROMPT (no runtime) scored −25pp on a 3B. The runtime — real search + fresh-context verify — is the active ingredient, not prompt text.</text>

