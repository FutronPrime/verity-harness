<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 680" font-family="'Arial Narrow','Helvetica Neue',Arial,sans-serif">
  <defs>
    <linearGradient id="bbg" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#070a0d"/><stop offset="1" stop-color="#03060a"/></linearGradient>
    <linearGradient id="bw" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#2dd4bf"/><stop offset="1" stop-color="#118a7a"/></linearGradient>
    <pattern id="bscan" width="3" height="3" patternUnits="userSpaceOnUse"><rect width="3" height="1" fill="#0c1a1d" opacity="0.5"/></pattern>
    <style>.mono{font-family:'SF Mono','Menlo','Consolas',monospace} .hv{font-family:'Arial Black','Helvetica Neue',Arial,sans-serif;font-weight:900} .nar{font-family:'Arial Narrow',Arial,sans-serif}</style>
  </defs>
  <rect width="1200" height="680" fill="url(#bbg)"/>
  <rect width="1200" height="680" fill="url(#bscan)"/>
  <path d="M16,16 H1150 L1184,50 V664 H66 L16,614 Z" fill="none" stroke="#1f5c54" stroke-width="2"/>
  <path d="M16,70 V16 H70 M1184,610 V664 H1130" fill="none" stroke="#2dd4bf" stroke-width="3"/>
  <rect x="16" y="660" width="1168" height="4" fill="#d6299e"/>

  <text x="40" y="58" class="mono" font-size="14" letter-spacing="3" fill="#2dd4bf">/// VERITY.BENCHMARK // SMALL-SAMPLE · DIRECTIONAL · REPRODUCIBLE</text>
  <text x="44" y="104" class="hv" font-size="42" fill="#eafffb">VERITY BEATS A NAIVE LOOP</text>
  <text x="44" y="148" class="hv" font-size="42" fill="#2dd4bf">— WHERE THE MODEL NEEDS IT.</text>
  <text x="44" y="180" class="nar" font-size="18" fill="#8fb8b1">Adversarial tasks: the obvious answer is wrong. Naive ships the bug; the gates catch it. Mechanically scored on the edge cases.</text>

  <text x="44" y="206" class="mono" font-size="14" letter-spacing="2" fill="#5eead4">&gt;&gt; SCAFFOLD vs NAIVE // BY MODEL TIER</text>
  <path d="M34,226 L1132,226 L1166,260 L1166,482 L54,482 L34,462 Z" fill="none" stroke="#1f5c54" stroke-width="1.2"/>
  <path d="M38,230 L1131,230 L1162,261 L1162,478 L55,478 L38,461 Z" fill="none" stroke="#1f5c54" stroke-width="0.6" opacity="0.3"/>
  <g class="mono" font-size="14">
    <!-- weak -->
    <text x="44" y="262" class="nar" font-size="17" fill="#8aa">LLAMA-3.1-8B <tspan fill="#5b6b75">[WEAK]</tspan></text>
    <path d="M300,248 H424 L412,270 H300 Z" fill="#2a3942"/><text x="436" y="265" fill="#6b7c87">naive 0/3</text>
    <path d="M300,276 H424 L412,298 H300 Z" fill="#2a3942"/><text x="436" y="293" fill="#6b7c87">verity 0/3 — too weak to act on the catch</text>
    <!-- mid -->
    <text x="44" y="344" class="nar" font-size="17" fill="#cfe">LLAMA-3.3-70B <tspan fill="#5eead4">[MID]</tspan></text>
    <path d="M300,330 H500 L488,352 H300 Z" fill="#3a5660"/><text x="512" y="347" fill="#9fb3bb">naive 2/3</text>
    <path d="M300,358 H620 L608,380 H300 Z" fill="url(#bw)"/><text x="632" y="375" fill="#5eead4">verity 3/3 ✓ WINS — caught the bug naive shipped</text>
    <!-- strong -->
    <text x="44" y="426" class="nar" font-size="17" fill="#8aa">KIMI-K2 <tspan fill="#5b6b75">[STRONG]</tspan></text>
    <path d="M300,412 H620 L608,434 H300 Z" fill="#3a5660"/><text x="632" y="429" fill="#9fb3bb">naive 3/3</text>
    <path d="M300,440 H620 L608,462 H300 Z" fill="#2a6e64"/><text x="632" y="457" fill="#86bfb6">verity 3/3 — parity (rarely errs; gates rarely fire)</text>
  </g>

  <path d="M34,508 L1006,508 L1034,536 L1034,648 L50,648 L34,632 Z" fill="#0a1417" stroke="#1f6b60" stroke-width="1.2"/>
  <path d="M38,512 L1005,512 L1030,537 L1030,644 L51,644 L38,631 Z" fill="none" stroke="#1f6b60" stroke-width="0.7" opacity="0.38"/>
  <text x="44" y="540" class="mono" font-size="13" letter-spacing="3" fill="#5eead4">[ HONEST READ ]</text>
  <text x="44" y="562" class="nar" font-size="17" fill="#9fb3bb">The lift is real <tspan fill="#2dd4bf">in the value window</tspan> — capable-but-imperfect models (~32–70B). It can't make a weak model capable,</text>
  <text x="44" y="586" class="nar" font-size="17" fill="#9fb3bb">and a frontier model rarely needs it. Capability lives in the weights; VERITY governs how reliably it's applied.</text>
  <text x="44" y="622" class="mono" font-size="14" fill="#8fc7bf">$ python3 eval_adversarial.py   <tspan fill="#5b8a84"># small sample · single judge · re-run on your own suite</tspan></text>
  <g transform="translate(1092,612)">
    <path d="M0,-10 L9,10 L18,-10" fill="none" stroke="#b9c8c4" stroke-width="3" stroke-linejoin="round"/>
    <path d="M4,-1 L8,4 L15,-8" fill="none" stroke="#2dd4bf" stroke-width="2.6" stroke-linecap="round"/>
    <text x="28" y="6" class="hv" font-size="16" letter-spacing="3" fill="#eafffb">VERITY</text>
  </g>
</svg>
