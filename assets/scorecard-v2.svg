<text x="60" y="744" class="mono" font-size="12" fill="#2dd4bf" letter-spacing="1">&gt;&gt; NEW IN v2 · THE SOVEREIGNTY LAYER</text>
<g class="nar" font-size="15" fill="#bfe9e0">
  <text x="80" y="774">▸ <tspan class="hv" font-size="14" fill="#2dd4bf">CODE EXECUTOR</tspan> — drives OpenCode on an isolated worktree (plan-gate → build)</text>
  <text x="80" y="800">▸ <tspan class="hv" font-size="14" fill="#2dd4bf">SPEC-GATE</tspan> — no work without a falsifiable success criterion</text>
  <text x="80" y="826">▸ <tspan class="hv" font-size="14" fill="#2dd4bf">FRESH-CONTEXT VERIFY</tspan> — maker ≠ checker at the conversation level</text>
  <text x="620" y="774">▸ <tspan class="hv" font-size="14" fill="#2dd4bf">TOOL VETO</tspan> — block+reason injected → the model self-corrects</text>
  <text x="620" y="800">▸ <tspan class="hv" font-size="14" fill="#2dd4bf">DURABLE VERDICT</tspan> — evidence survives context compaction</text>
  <text x="620" y="826">▸ <tspan class="hv" font-size="14" fill="#2dd4bf">100% LOCAL · 0 KEYS</tspan> — Ollama → OpenCode·mempalace·ccr·embeddings</text>
