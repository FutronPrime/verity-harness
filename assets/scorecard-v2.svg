<text x="40" y="54" class="mono" font-size="13" fill="#2dd4bf" letter-spacing="2">/// VERITY v2 // HARNESS SOVEREIGNTY · SAME MODEL ± THE HARNESS · REPRODUCIBLE</text>
<text x="44" y="104" class="hv" font-size="38" fill="#eafffb">HARNESS &gt; MODEL. NOW WITH RECEIPTS.</text>
<rect x="46" y="116" width="430" height="3" fill="#d6299e"/>
<text x="44" y="146" class="nar" font-size="14.5" fill="#8fb8b1">Same model against itself — only the discipline changes. v2 adds a code executor, 4 new gates, and a fully-local keyless stack. Every number live, ledger-logged, reproducible.</text>

<text x="60" y="186" class="mono" font-size="12" fill="#2dd4bf" letter-spacing="1">&gt;&gt; AXIS / WHAT IT PROVES</text>
