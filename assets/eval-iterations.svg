<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" font-family="'Arial Narrow','Helvetica Neue',Arial,sans-serif" role="img">
<defs><linearGradient id="bg" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#070a0d"/><stop offset="1" stop-color="#03060a"/></linearGradient><pattern id="scan" width="3" height="3" patternUnits="userSpaceOnUse"><rect width="3" height="1" fill="#0c1a1d" opacity="0.5"/></pattern><style>.mono{font-family:'SF Mono','Menlo',monospace}.hv{font-family:'Arial Black',Arial,sans-serif;font-weight:900}.nar{font-family:'Arial Narrow',Arial,sans-serif}</style></defs><rect width="1200" height="720" fill="url(#bg)"/><rect width="1200" height="720" fill="url(#scan)"/><path d="M16,16 H1150 L1184,50 V704 H66 L16,654 Z" fill="none" stroke="#1f5c54" stroke-width="2"/>
<text x="40" y="54" class="mono" font-size="13" fill="#2dd4bf" text-anchor="start" letter-spacing="2">/// VERITY.EVAL // HOW WE GOT TO A NUMBER WE TRUST</text>
<text x="44" y="104" class="hv" font-size="40" fill="#eafffb" text-anchor="start">THE ITERATIONS</text>
<rect x="46" y="118" width="270" height="3" fill="#d6299e"/>
<text x="44" y="150" class="nar" font-size="15.5" fill="#8fb8b1" text-anchor="start">Honest progression — including the run where the harness caught its OWN broken eval. That dip is a feature: a confidently-wrong 92% would have been worse than no number.</text>
<path d="M60,200 L394,200 L420,226 L420,610 L76,610 L60,594 Z" fill="#0a0f12" stroke="#fcee0a" stroke-width="1.5"/>
<path d="M64,204 L393,204 L416,227 L416,606 L77,606 L64,593 Z" fill="none" stroke="#fcee0a" stroke-width="0.7" opacity="0.38"/>
<text x="84" y="244" class="hv" font-size="34" fill="#fcee0a" text-anchor="start">V1</text>
<text x="84" y="274" class="mono" font-size="12.5" fill="#8fb8b1" text-anchor="start">4 traps · web search · n=4</text>
<text x="84" y="314" class="nar" font-size="12" fill="#5b8a84" text-anchor="start">naive</text>
<rect x="84" y="320" width="250" height="26" rx="2" fill="#0c1417" stroke="#1f3a3a"/>
<rect x="84" y="320" width="42" height="26" rx="2" fill="#3a5660"/>
<text x="346" y="340" class="hv" font-size="16" fill="#5b8a84" text-anchor="start">17%</text>
<text x="84" y="372" class="nar" font-size="12" fill="#fcee0a" text-anchor="start">harness</text>
<rect x="84" y="378" width="250" height="26" rx="2" fill="#0c1417" stroke="#1f3a3a"/>
<path d="M84,378 L219,378 L229,388 L229,404 L90,404 L84,398 Z" fill="#fcee0a" opacity="0.92"/>
<text x="346" y="398" class="hv" font-size="16" fill="#fcee0a" text-anchor="start">58%</text>
<text x="84" y="448" class="hv" font-size="20" fill="#3a5660" text-anchor="start">2/12</text>
<text x="130" y="448" class="hv" font-size="18" fill="#8fb8b1" text-anchor="start">→</text>
<text x="156" y="448" class="hv" font-size="20" fill="#fcee0a" text-anchor="start">7/12</text>
<text x="84" y="485" class="nar" font-size="12.5" fill="#8fb8b1" text-anchor="start">noisy — gemini-2.0 landed +0,</text>
<text x="84" y="503" class="nar" font-size="12.5" fill="#8fb8b1" text-anchor="start">gpt-4o-mini swung 0→4 then 1→3</text>
<text x="84" y="521" class="nar" font-size="12.5" fill="#8fb8b1" text-anchor="start">between runs</text>
<path d="M423,405.0 L437,405.0" stroke="#586872" stroke-width="2"/>
<path d="M431,400.0 L437,405.0 L431,410.0" fill="#586872"/>
<path d="M440,200 L774,200 L800,226 L800,610 L456,610 L440,594 Z" fill="#0a0f12" stroke="#ff5d6c" stroke-width="1.5"/>
<path d="M444,204 L773,204 L796,227 L796,606 L457,606 L444,593 Z" fill="none" stroke="#ff5d6c" stroke-width="0.7" opacity="0.38"/>
<text x="464" y="244" class="hv" font-size="34" fill="#ff5d6c" text-anchor="start">V2</text>
<text x="464" y="274" class="mono" font-size="12.5" fill="#8fb8b1" text-anchor="start">16 traps · web-search markers</text>
<text x="464" y="314" class="nar" font-size="12" fill="#5b8a84" text-anchor="start">naive</text>
<rect x="464" y="320" width="250" height="26" rx="2" fill="#0c1417" stroke="#1f3a3a"/>
<rect x="464" y="320" width="15" height="26" rx="2" fill="#3a5660"/>
<text x="726" y="340" class="hv" font-size="16" fill="#5b8a84" text-anchor="start">6%</text>
<text x="464" y="372" class="nar" font-size="12" fill="#ff5d6c" text-anchor="start">harness</text>
<rect x="464" y="378" width="250" height="26" rx="2" fill="#0c1417" stroke="#1f3a3a"/>
<path d="M464,378 L484,378 L494,388 L494,404 L470,404 L464,398 Z" fill="#ff5d6c" opacity="0.92"/>
<text x="726" y="398" class="hv" font-size="16" fill="#ff5d6c" text-anchor="start">12%</text>
<text x="464" y="448" class="hv" font-size="20" fill="#3a5660" text-anchor="start">1/16</text>
<text x="510" y="448" class="hv" font-size="18" fill="#8fb8b1" text-anchor="start">→</text>
<text x="536" y="448" class="hv" font-size="20" fill="#ff5d6c" text-anchor="start">2/16</text>
<text x="464" y="485" class="nar" font-size="12.5" fill="#8fb8b1" text-anchor="start">harness COLLAPSED: web search can't</text>
<text x="464" y="503" class="nar" font-size="12.5" fill="#8fb8b1" text-anchor="start">surface exact slugs (kimi-k2.7,</text>
<text x="464" y="521" class="nar" font-size="12.5" fill="#8fb8b1" text-anchor="start">opus-4.8). the eval caught its OWN</text>
<text x="464" y="539" class="nar" font-size="12.5" fill="#8fb8b1" text-anchor="start">invalid markers — diagnosed, not</text>
<text x="464" y="557" class="nar" font-size="12.5" fill="#8fb8b1" text-anchor="start">shipped</text>
<path d="M803,405.0 L817,405.0" stroke="#586872" stroke-width="2"/>
<path d="M811,400.0 L817,405.0 L811,410.0" fill="#586872"/>
<path d="M820,200 L1154,200 L1180,226 L1180,610 L836,610 L820,594 Z" fill="#0a0f12" stroke="#2dd4bf" stroke-width="1.5"/>
<path d="M824,204 L1153,204 L1176,227 L1176,606 L837,606 L824,593 Z" fill="none" stroke="#2dd4bf" stroke-width="0.7" opacity="0.38"/>
<text x="844" y="244" class="hv" font-size="34" fill="#2dd4bf" text-anchor="start">V3</text>
<text x="844" y="274" class="mono" font-size="12.5" fill="#8fb8b1" text-anchor="start">16 traps · registry · temp=0 · 5 models</text>
<text x="844" y="314" class="nar" font-size="12" fill="#5b8a84" text-anchor="start">naive</text>
<rect x="844" y="320" width="250" height="26" rx="2" fill="#0c1417" stroke="#1f3a3a"/>
<rect x="844" y="320" width="20" height="26" rx="2" fill="#3a5660"/>
<text x="1106" y="340" class="hv" font-size="16" fill="#5b8a84" text-anchor="start">8%</text>
<text x="844" y="372" class="nar" font-size="12" fill="#2dd4bf" text-anchor="start">harness</text>
<rect x="844" y="378" width="250" height="26" rx="2" fill="#0c1417" stroke="#1f3a3a"/>
<path d="M844,378 L1061,378 L1071,388 L1071,404 L850,404 L844,398 Z" fill="#2dd4bf" opacity="0.92"/>
<text x="1106" y="398" class="hv" font-size="16" fill="#2dd4bf" text-anchor="start">91%</text>
<text x="844" y="448" class="hv" font-size="20" fill="#3a5660" text-anchor="start">6/80</text>
<text x="890" y="448" class="hv" font-size="18" fill="#8fb8b1" text-anchor="start">→</text>
<text x="916" y="448" class="hv" font-size="20" fill="#2dd4bf" text-anchor="start">73/80</text>
<text x="844" y="485" class="nar" font-size="12.5" fill="#8fb8b1" text-anchor="start">deterministic; every model</text>
<text x="844" y="503" class="nar" font-size="12.5" fill="#8fb8b1" text-anchor="start">+12..+14; lift generalizes</text>
<text x="844" y="521" class="nar" font-size="12.5" fill="#8fb8b1" text-anchor="start">uniformly</text>
<text x="44" y="676" class="mono" font-size="13" fill="#586872" text-anchor="start"># v2 wasn't a failure to hide — it's the receipt that the method is honest. v3 is the number.</text>
<rect x="16" y="700" width="1168" height="4" fill="#d6299e"/>
</svg>
