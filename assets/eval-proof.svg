<text x="40" y="54" class="mono" font-size="13" fill="#2dd4bf" text-anchor="start" letter-spacing="2">/// VERITY.EVAL // SAME MODEL · OPPOSITE RESULT · REPRODUCIBLE</text>
<text x="44" y="104" class="hv" font-size="40" fill="#eafffb" text-anchor="start">FORCE THE LOOKUP,</text>
<text x="44" y="148" class="hv" font-size="40" fill="#2dd4bf" text-anchor="start">FLIP THE ANSWER.</text>
<rect x="46" y="162" width="300" height="3" fill="#d6299e"/>
<text x="44" y="192" class="nar" font-size="15.5" fill="#8fb8b1" text-anchor="start">A/B on 16 assumption-traps whose answers are POST training-cutoff (the model can't know them). Same model + prompts each —</text>
<text x="44" y="213" class="nar" font-size="15.5" fill="#8fb8b1" text-anchor="start">the only change: the harness reads the authoritative source first.</text>
