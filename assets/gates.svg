<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" font-family="'Arial Narrow','Helvetica Neue',Arial,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#070a0d"/><stop offset="1" stop-color="#03060a"/></linearGradient>
    <linearGradient id="tg" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#2dd4bf"/><stop offset="1" stop-color="#0c6e62"/></linearGradient>
    <pattern id="scan" width="3" height="3" patternUnits="userSpaceOnUse"><rect width="3" height="1" fill="#0c1a1d" opacity="0.5"/></pattern>
    <style>.mono{font-family:'SF Mono','Menlo','Consolas',monospace} .hv{font-family:'Arial Black','Helvetica Neue',Arial,sans-serif;font-weight:900} .nar{font-family:'Arial Narrow',Arial,sans-serif}</style>
  </defs>
  <rect width="1200" height="720" fill="url(#bg)"/>
  <rect width="1200" height="720" fill="url(#scan)"/>

  <!-- angular cut-corner frame -->
  <path d="M16,16 H1150 L1184,50 V704 H66 L16,654 Z" fill="none" stroke="#1f5c54" stroke-width="2"/>
  <!-- corner registration ticks + magenta -->
  <path d="M16,70 V16 H70 M1184,650 V704 H1130" fill="none" stroke="#2dd4bf" stroke-width="3"/>
  <rect x="16" y="700" width="1168" height="4" fill="#d6299e"/>

  <!-- HUD top bar -->
  <text x="40" y="58" class="mono" font-size="14" letter-spacing="3" fill="#2dd4bf">/// VERITY.ENFORCEMENT.MODULE</text>
  <text x="1160" y="58" text-anchor="end" class="mono" font-size="14" letter-spacing="2" fill="#5b8a84">[ STATUS: ACTIVE ]</text>

  <!-- title -->
  <text x="44" y="132" class="hv" font-size="56" letter-spacing="1" fill="#eafffb">A PROMPT <tspan fill="#7fb3ab">REQUESTS.</tspan></text>
  <text x="44" y="190" class="hv" font-size="56" letter-spacing="1" fill="#2dd4bf">VERITY ENFORCES.</text>
  <rect x="46" y="204" width="430" height="3" fill="#d6299e"/>
  <text x="44" y="234" class="nar" font-size="20" fill="#8fb8b1">LLMs are probabilistic — the harness, not the model, decides when discipline fires.</text>

  <!-- left: prompt doctrine (dim) -->
  <text x="44" y="290" class="mono" font-size="13" letter-spacing="3" fill="#586872">&gt;&gt; PROMPT DOCTRINE // HOPES</text>
  <g class="nar" font-size="17">
    <g>
      <path d="M44,304 H516 V356 L500,372 H44 Z" fill="#0c1217" stroke="#26323b"/>
      <text x="62" y="332" class="mono" font-size="13" fill="#76858f">"verify before you act"</text>
      <text x="62" y="354" fill="#5e6e78">may or may not. no backstop.</text>
    </g>
    <g>
      <path d="M44,386 H516 V438 L500,454 H44 Z" fill="#0c1217" stroke="#26323b"/>
      <text x="62" y="414" class="mono" font-size="13" fill="#76858f">"don't give up"</text>
      <text x="62" y="436" fill="#5e6e78">quits at the first wall anyway.</text>
    </g>
    <g>
      <path d="M44,468 H516 V520 L500,536 H44 Z" fill="#0c1217" stroke="#26323b"/>
      <text x="62" y="496" class="mono" font-size="13" fill="#76858f">"reuse existing tools"</text>
      <text x="62" y="518" fill="#5e6e78">reinvents from scratch when it forgets.</text>
    </g>
  </g>

  <!-- right: verity gates -->
  <text x="640" y="290" class="mono" font-size="13" letter-spacing="3" fill="#2dd4bf">&gt;&gt; VERITY GATES // FIRE ON CODE CONDITIONS</text>
  <g>
    <!-- repeated angular HUD cards -->
    <g class="nar" font-size="14.5">
      <g><path d="M640,304 H1160 L1160,346 H656 L640,330 Z" fill="#0a1d1b" stroke="#1f6b60"/><rect x="640" y="304" width="6" height="42" fill="url(#tg)"/>
        <text x="664" y="324" class="mono" font-size="13" fill="#5eead4">VERIFY_GATE</text>
        <text x="664" y="340" fill="#86bfb6">every action adversarially checked — did it REALLY work?</text></g>
      <g><path d="M640,356 H1160 L1160,398 H656 L640,382 Z" fill="#0a1d1b" stroke="#1f6b60"/><rect x="640" y="356" width="6" height="42" fill="url(#tg)"/>
        <text x="664" y="376" class="mono" font-size="13" fill="#5eead4">CALIBRATION_GATE</text>
        <text x="664" y="392" fill="#86bfb6">challenges every "done" → tags VERIFIED vs GUESS</text></g>
      <g><path d="M640,408 H1160 L1160,450 H656 L640,434 Z" fill="#0a1d1b" stroke="#1f6b60"/><rect x="640" y="408" width="6" height="42" fill="url(#tg)"/>
        <text x="664" y="428" class="mono" font-size="13" fill="#5eead4">PERSISTENCE_GATE</text>
        <text x="664" y="444" fill="#86bfb6">refuses to abort — forces a different approach, N times</text></g>
      <g><path d="M640,460 H1160 L1160,502 H656 L640,486 Z" fill="#0a1d1b" stroke="#1f6b60"/><rect x="640" y="460" width="6" height="42" fill="url(#tg)"/>
        <text x="664" y="480" class="mono" font-size="13" fill="#5eead4">RESEARCH_ON_STUCK</text>
        <text x="664" y="496" fill="#86bfb6">auto-searches GitHub/Reddit/HN/SO on the real error</text></g>
      <g><path d="M640,512 H1160 L1160,554 H656 L640,538 Z" fill="#0a1d1b" stroke="#1f6b60"/><rect x="640" y="512" width="6" height="42" fill="url(#tg)"/>
        <text x="664" y="532" class="mono" font-size="13" fill="#5eead4">REUSE_FIRST_DISCOVERY</text>
        <text x="664" y="548" fill="#86bfb6">own tools → external → build; auto-fires on build tasks</text></g>
    </g>
  </g>

  <!-- footer -->
  <text x="44" y="612" class="hv" font-size="24" fill="#cdeee8">THE MODEL REASONS INSIDE RAILS IT CANNOT FALL OFF OF.</text>
  <!-- barcode strip -->
  <g fill="#2dd4bf" opacity="0.8">
    <rect x="44" y="630" width="2" height="22"/><rect x="49" y="630" width="5" height="22"/><rect x="57" y="630" width="2" height="22"/><rect x="62" y="630" width="3" height="22"/><rect x="68" y="630" width="6" height="22"/><rect x="77" y="630" width="2" height="22"/><rect x="82" y="630" width="4" height="22"/><rect x="89" y="630" width="2" height="22"/>
  </g>
  <text x="100" y="646" class="mono" font-size="12" letter-spacing="2" fill="#3f7d76">PROBABILISTIC CORE · DETERMINISTIC RAILS</text>
  <!-- brand sig -->
  <g transform="translate(1090,632)">
    <path d="M0,-10 L9,10 L18,-10" fill="none" stroke="#b9c8c4" stroke-width="3" stroke-linejoin="round"/>
    <path d="M4,-1 L8,4 L15,-8" fill="none" stroke="#2dd4bf" stroke-width="2.6" stroke-linecap="round"/>
    <text x="28" y="6" class="hv" font-size="16" letter-spacing="3" fill="#eafffb">VERITY</text>
  </g>
</svg>
