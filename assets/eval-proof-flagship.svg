<text x="830" y="668" class="nar" font-size="12.5" fill="#8fb8b1" text-anchor="start">same models · opposite result · reproducible</text>
<text x="44" y="824" class="mono" font-size="14" fill="#8fc7bf" text-anchor="start">$ python3 -m verity eval --models</text>
