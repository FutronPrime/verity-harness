<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 856" font-family="'Arial Narrow','Helvetica Neue',Arial,sans-serif" role="img">
<defs><linearGradient id="bg" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#070a0d"/><stop offset="1" stop-color="#03060a"/></linearGradient><pattern id="scan" width="3" height="3" patternUnits="userSpaceOnUse"><rect width="3" height="1" fill="#0c1a1d" opacity="0.5"/></pattern><style>.mono{font-family:'SF Mono','Menlo',monospace}.hv{font-family:'Arial Black',Arial,sans-serif;font-weight:900}.nar{font-family:'Arial Narrow',Arial,sans-serif}</style></defs><rect width="1200" height="856" fill="url(#bg)"/><rect width="1200" height="856" fill="url(#scan)"/><path d="M16,16 H1150 L1184,50 V840 H66 L16,790 Z" fill="none" stroke="#1f5c54" stroke-width="2"/>
<text x="40" y="54" class="mono" font-size="13" fill="#2dd4bf" text-anchor="start" letter-spacing="2">/// VERITY.EVAL // SAME MODEL · OPPOSITE RESULT · REPRODUCIBLE</text>
<text x="44" y="104" class="hv" font-size="40" fill="#eafffb" text-anchor="start">FORCE THE LOOKUP,</text>
<text x="44" y="148" class="hv" font-size="40" fill="#2dd4bf" text-anchor="start">FLIP THE ANSWER.</text>
<rect x="46" y="162" width="300" height="3" fill="#d6299e"/>
<text x="44" y="192" class="nar" font-size="15.5" fill="#8fb8b1" text-anchor="start">A/B on 16 assumption-traps whose answers are POST training-cutoff (the model can't know them). Same model + prompts each —</text>
<text x="44" y="213" class="nar" font-size="15.5" fill="#8fb8b1" text-anchor="start">the only change: the harness reads the authoritative source first.</text>
<text x="60" y="238" class="mono" font-size="12" fill="#586872" text-anchor="start">naive ▁  vs  harness ▔   (per model)</text>
